<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX AI - SPEAKING 20 UNITS</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0d47a1; --s: #1976d2; --orange: #ff6d00; --bg: #f0f4f8; --gold: #ffd700; }
        body { font-family: 'Lexend', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: white; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); border: 10px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        .header { background: var(--p); color: white; padding: 20px; text-align: center; border-bottom: 6px solid var(--gold); }
        .setup { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 10px; padding: 15px; background: #e3f2fd; }
        input, select { padding: 12px; border-radius: 12px; border: 2px solid var(--s); font-size: 16px; font-weight: bold; width: 100%; box-sizing: border-box; }
        .screen { min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .alex-say { font-size: 34px; color: var(--p); font-weight: 900; line-height: 1.3; margin-bottom: 20px; min-height: 100px; }
        .user-say { font-size: 24px; color: #555; background: #f0f0f0; padding: 15px 30px; border-radius: 50px; border: 3px dashed var(--s); margin-bottom: 20px; }
        .orange-box { display: none; background: #fff3e0; border: 4px solid var(--orange); border-radius: 20px; padding: 15px; margin-bottom: 20px; cursor: pointer; animation: pulse 1s infinite; }
        .orange-box p { font-size: 28px; margin: 5px 0; color: #bf360c; font-weight: 900; }
        .mic-btn { width: 300px; height: 90px; border: none; border-radius: 45px; background: var(--p); color: white; font-size: 26px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 0 #072a61; margin-bottom: 20px; }
        .mic-btn.active { background: #d32f2f; transform: translateY(5px); box-shadow: none; }
        .cert { display: none; padding: 40px; border: 20px double var(--gold); background: white; margin: 20px; border-radius: 10px; }
        
        /* Khung vàng Giáo viên trang trọng */
        .teacher-frame { border: 5px solid var(--gold); background: #fffde7; margin: 10px 20px 20px 20px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .teacher-info { flex: 1; }
        .teacher-name { font-size: 22px; font-weight: 900; color: #333; display: block; }
        .teacher-role { font-size: 14px; color: #666; font-weight: bold; text-transform: uppercase; }

        #stars { font-size: 80px; position: fixed; top: 40%; display: none; z-index: 100; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>SPEAKING ENGLISH WITH ALEX 🌟</h1></div>
    <div class="setup">
        <input id="inName" placeholder="Student's Name...">
        <input id="inClass" placeholder="Class (e.g. 5/1)">
        <select id="unit" onchange="resetApp()"></select>
    </div>
    <div class="screen" id="mainZone">
        <div id="stars">⭐⭐⭐⭐⭐</div>
        <div id="gameUI">
            <div class="alex-say" id="alexSay">Hi! I'm Alex. Let's practice English!</div>
            <div class="user-say" id="userSay">Click Start to talk...</div>
            <div id="orange" class="orange-box" onclick="playModel()">
                <b style="color: red;">⚠️ PLEASE REPEAT:</b>
                <p id="modelTxt"></p>
            </div>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙 START SPEAKING</button>
        </div>

        <div class="cert" id="cert">
            <h2 style="font-family: 'Dancing Script'; font-size: 70px; color: #d32f2f; margin:0;">Certificate</h2>
            <p style="font-size: 22px; letter-spacing: 2px;">OF ACHIEVEMENT</p>
            <p style="font-size: 20px;">Proudly presented to</p>
            <h2 id="outName" style="color: #0d47a1; font-size: 45px; border-bottom: 3px solid #333; display: inline-block; min-width: 300px; margin: 10px 0;"></h2>
            <p id="outUnit" style="font-size: 28px; font-weight: bold; color: #2e7d32;"></p>
            <p style="font-size: 20px; color: #ff6d00; font-weight: bold; margin-top: 15px;">"Keep talking with Alex to be better every day!"</p>
        </div>
    </div>

    <div class="teacher-frame" id="teacherFrame">
        <div class="teacher-info">
            <span class="teacher-name">Mrs. Tran Thi Kim Yen</span>
            <span class="teacher-role">English Teacher</span>
        </div>
        <div class="teacher-info" style="border-left: 2px dashed #ffd700;">
            <span class="teacher-name">Mrs. Pham Thi Ngoc Bich</span>
            <span class="teacher-role">English Teacher</span>
        </div>
    </div>
</div>

<script>
const units = {
    1: { n: "All about me", qa: [{q: "Can you tell me about yourself?", a: "My name's [Name]. I'm in class [Class].", k: ["name","class"]}, {q: "What's your favourite colour?", a: "It's blue.", k: ["blue","red","yellow","green"]}, {q: "What's your favourite animal?", a: "It's a dog.", k: ["dog","cat","rabbit"]}, {q: "What's your favourite food?", a: "It's pizza.", k: ["pizza","fish","chicken"]}] },
    2: { n: "Our homes", qa: [{q: "Do you live in this house?", a: "Yes, I do.", k: ["yes","no","do"]}, {q: "What's your address?", a: "It's 65 Le Loi Street.", k: ["address","street"]}] },
    3: { n: "My foreign friends", qa: [{q: "Do you have any friends?", a: "Yes, I do.", k: ["yes","do"]}, {q: "What nationality is he?", a: "He's Vietnamese.", k: ["vietnamese","japanese"]}] },
    4: { n: "Our free-time activities", qa: [{q: "What do you like doing in your free time?", a: "I like riding my bike.", k: ["bike","ride","cycling"]}, {q: "What do you do at the weekend?", a: "I usually read books.", k: ["read","books","watch"]}] },
    5: { n: "My future job", qa: [{q: "What would you like to be in the future?", a: "I'd like to be a teacher.", k: ["teacher","doctor","pilot"]}, {type: "follow", logic: {"teacher": "Why would you like to be a teacher?|Because I'd like to teach children."}}] },
    6: { n: "Our school rooms", qa: [{q: "Where's the art room?", a: "It's on the second floor.", k: ["floor","second"]}, {q: "Could you tell me the way to the art room?", a: "Go upstairs and turn right.", k: ["upstairs","right"]}] },
    7: { n: "Our favourite school activities", qa: [{q: "What school activity does he like?", a: "He likes reading books.", k: ["reading"]}, {type: "follow", logic: {"reading": "Why does he like reading books?|Because he thinks it's interesting."}}] },
    8: { n: "In our classroom", qa: [{q: "Where are the crayons?", a: "They are on the table.", k: ["on","table"]}, {q: "Whose pen is this?", a: "It's Huong's.", k: ["huong","it's"]}] },
    9: { n: "Our outdoor activities", qa: [{q: "Were you at the campsite last week?", a: "Yes, we were.", k: ["yes","were"]}, {q: "What did you do yesterday?", a: "We listened to music.", k: ["listened","music"]}] },
    10: { n: "Our school trip", qa: [{q: "Did they go to Ba Na Hills?", a: "Yes, they did.", k: ["yes","did"]}, {q: "What did they do there?", a: "They visited the old buildings.", k: ["visited","buildings"]}] },
    11: { n: "Family time", qa: [{q: "Did you swim?", a: "Yes, I did. I swam with my mother.", k: ["swam","mother"]}, {q: "What did your family do in Ha Long Bay?", a: "We took a boat trip.", k: ["boat","trip"]}] },
    12: { n: "Our Tet holiday", qa: [{q: "Will you make banh chung for Tet?", a: "Yes, I will.", k: ["yes","will"]}, {q: "Where will you go at Tet?", a: "I'll go to my grandparents' house.", k: ["grandparents","house"]}] },
    13: { n: "Our special days", qa: [{q: "What will you do on Children's Day?", a: "We'll dance.", k: ["dance","sing"]}, {q: "What food will you have?", a: "We'll have pizza and burgers.", k: ["pizza","burgers"]}] },
    14: { n: "Staying healthy", qa: [{q: "How does he stay healthy?", a: "He does morning exercise.", k: ["exercise","healthy"]}, {q: "How often does he play sports?", a: "Every day.", k: ["every","day"]}] },
    15: { n: "Our health", qa: [{q: "What's the matter?", a: "I have a headache.", k: ["headache","matter"]}, {type: "follow", logic: {"head": "What should you do?|I should have a rest."}}] },
    16: { n: "Seasons and the weather", qa: [{q: "How's the weather in spring?", a: "It's warm.", k: ["warm","spring"]}, {q: "What do you usually wear in winter?", a: "I wear a coat.", k: ["coat","winter"]}] },
    17: { n: "Stories for children", qa: [{q: "Who are the main characters?", a: "They're the fox and the crow.", k: ["fox","crow"]}, {q: "How did she sing?", a: "She sang beautifully.", k: ["beautifully","sang"]}] },
    18: { n: "Means of transport", qa: [{q: "Where do you want to visit?", a: "I want to visit Dragon Bridge.", k: ["dragon","visit"]}, {q: "How can I get there?", a: "You can get there by bicycle.", k: ["bicycle","by"]}] },
    19: { n: "Places of interest", qa: [{q: "What do you think of Hoi An?", a: "I think it's exciting.", k: ["exciting","think"]}, {q: "How far is it?", a: "It's about 29 kilometres.", k: ["kilometres","far"]}] },
    20: { n: "Our summer holidays", qa: [{q: "Where are you going to visit?", a: "I'm going to visit Phu Quoc Island.", k: ["phu quoc","visit"]}, {q: "What are you going to do?", a: "I'm going to go camping.", k: ["camping","go"]}] }
};

const uSel = document.getElementById('unit');
for(let i=1; i<=20; i++) uSel.innerHTML += `<option value="${i}">Unit ${i}: ${units[i].n}</option>`;

let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
rec.lang = 'en-US';
let qIdx = 0, isRec = false, currentCtx = "";

function resetApp() {
    qIdx = 0;
    document.getElementById('gameUI').style.display = 'block';
    document.getElementById('cert').style.display = 'none';
    document.getElementById('orange').style.display = 'none';
    updateAlex(units[uSel.value].qa[0].q);
}

function toggleMic() {
    if(!isRec) { try{rec.start();}catch(e){}; document.getElementById('micBtn').classList.add('active'); isRec = true; }
    else { rec.stop(); document.getElementById('micBtn').classList.remove('active'); isRec = false; }
}

rec.onresult = (e) => {
    let said = e.results[0][0].transcript.toLowerCase();
    document.getElementById('userSay').innerText = `You: "${said}"`;
    isRec = false; document.getElementById('micBtn').classList.remove('active');
    handleAlexAsk(said);
};

function handleAlexAsk(said) {
    let u = units[uSel.value];
    let item = u.qa[qIdx];
    if(item.type === "follow") {
        let logic = item.logic[currentCtx] || Object.values(item.logic)[0];
        updateAlex(logic.split('|')[0]); document.getElementById('modelTxt').innerText = logic.split('|')[1];
        qIdx++; return;
    }
    item.k?.forEach(k => { if(said.includes(k)) currentCtx = k; });
    if(item.k?.some(k => said.includes(k)) || said.split(' ').length > 2) {
        document.getElementById('orange').style.display = 'none'; showStars(); qIdx++;
        new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3').play();
        if(qIdx < u.qa.length) setTimeout(() => updateAlex(u.qa[qIdx].q), 2000);
        else setTimeout(finish, 2000);
    } else {
        document.getElementById('orange').style.display = 'block';
        document.getElementById('modelTxt').innerText = item.a.replace("[Name]", document.getElementById('inName').value || "Minh").replace("[Class]", document.getElementById('inClass').value || "5/1");
        speak("Listen and repeat.");
    }
}

function updateAlex(t) { document.getElementById('alexSay').innerText = t; speak(t); }
function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
function playModel() { speak(document.getElementById('modelTxt').innerText); }
function showStars() { let s = document.getElementById('stars'); s.style.display = 'block'; setTimeout(() => s.style.display = 'none', 2000); }

function finish() {
    document.getElementById('gameUI').style.display = 'none';
    document.getElementById('cert').style.display = 'block';
    document.getElementById('outName').innerText = (document.getElementById('inName').value || "Super Student").toUpperCase();
    document.getElementById('outUnit').innerText = "UNIT " + uSel.value + ": " + units[uSel.value].n;
}
window.onload = resetApp;
</script>
</body>
</html>
